<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- Primary Meta -->
    <title>MD Automobile — Dealership Management</title>
    <meta name="description" content="Complete electric two-wheeler dealership management system" />
    <meta name="theme-color" content="#16a34a" />
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="MD Automobile" />
    
    <!-- iOS Safari PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MD Automobile" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="shortcut icon" href="/icons/icon-192.png" />
    
    <!-- Open Graph (link previews) -->
    <meta property="og:title" content="MD Automobile" />
    <meta property="og:description" content="Electric Two-Wheeler Dealership Management" />
    <meta property="og:image" content="/icons/icon-512.png" />
    <meta property="og:type" content="website" />
    
    <!-- Prevent iOS phone-number auto-detection in numbers we show -->
    <meta name="format-detection" content="telephone=no" />
  </head>
  <body class="bg-slate-950 text-white">
    <noscript>This app requires JavaScript to run.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
